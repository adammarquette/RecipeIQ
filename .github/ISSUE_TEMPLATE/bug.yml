name: Bug
description: Report a defect in shipped behavior.
title: "Bug: "
labels:
  - type:bug
  - status:awaiting-human-review
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken and impact.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Given ..., when ..., then ...
    validations:
      required: true
